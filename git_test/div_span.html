<!DOCTYPE html>
	<html>
	<head>
		<title>Divs e Ids</title>
		<meta charset="utf-8">

		<style type="text/css">
			
			#topo {
				background: blue;
			}

			#conteudo {
				background: red;
			}


		</style>

	</head>
	<body>

		<div id="topo">
			
			<img src="img/amazon.webp" width="200">
			<ul>
				<li>Home</li>
				<li>Produtos</li>
				<li>Contato</li>
			</ul>
		</div>

		<div id="conteudo">
			
			<div>
				Produto 1
			</div>

			<div>
				Produto 2
			</div>

			<div>
				Produto 3
			</div>

		</div>

	</body>
</html>
